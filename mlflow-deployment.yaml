apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.22.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install psycopg2-binary boto3 s3fs --quiet && \
              mlflow server \
                --backend-store-uri postgresql://mlflow:mlflowpass@postgres-postgresql:5432/mlflowdb \
                --default-artifact-root s3://mlflow \
                --host 0.0.0.0 \
                --port 5000 
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            - name: MLFLOW_PORT
              value: "5000"
            - name: AWS_ACCESS_KEY_ID
              value: admin
            - name: AWS_SECRET_ACCESS_KEY
              value: admin12345
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
spec:
  type: ClusterIP
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
